name: Build and Deploy to Kubernetes via ArgoCD
on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: true

      - name: Build, tag, and push image to ECR
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_K8S }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPO:$IMAGE_TAG .
          docker push $ECR_REPO:$IMAGE_TAG

      - name: Checkout chart repo
        uses: actions/checkout@v3
        with:
          repository: IPpetrov/ci-dashboard-chart
          token: ${{ secrets.CHART_REPO_PAT }}
          path: chart-repo

      - name: Bump image tag in values.yaml
        env:
          ECR_REPO: ${{ secrets.ECR_REPO_K8S }}
        run: |
          IMAGE_TAG=${{ github.sha }}
          yq -i ".image.repository = \"${ECR_REPO}\" | .image.tag = \"${IMAGE_TAG}\" | .image.pullPolicy = \"IfNotPresent\"" chart-repo/values.yaml

      - name: Commit and push chart update
        run: |
          cd chart-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add values.yaml
          git commit -m "deploy: image ${{ github.sha }}"
          git push
