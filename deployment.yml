apiVersion: apps/v1
kind: Deployment
metadata:
  name: ci-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ci-dashboard
  template:
    metadata:
      labels:
        app: ci-dashboard
    spec:
      containers:
        - name: ci-dashboard
          image: ci-dashboard:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080